 <!-- Cabeçalho -->
 <header class="header" id="home">
 <h1>Minha Loja Online</h1>

 <nav class="nav-menu">
 <ul>

 </ul>

 </header>

 <main>

 <!-- Produtos com imagem -->

<p>Smartphone com alta tecnologia.</p>
 </article>

 <article class="product">
 <h3>Capa de celular</h3>

 <p>Capa de celular A56.</p>
 </article>

 </section>

 <!-- Vídeo promocional -->
 <section class="promo-video">
 <h2>Conheça nossa loja</h2>

 <video controls width="300">
 <source src="img/video.mp4" type="video/mp4">
 Seu navegador não suporta vídeo.
 </video>
 </section>

 <!-- Integração com iframe -->
 <section class="location">
 <h2>Nossa Localização</h2>

 <iframe src=

"https://www.youtube.com/embed/a4cA0ET9DRY?si=WXRjD9ngmuBGpHN7" width="300" height="200" title="Vídeo externo">

 </iframe>

 </section>

<!-- Formulário -->
 <section id="contato">
 <h2>Cadastro / Contato</h2>

 <form class="form-contact">

 <fieldset>
<legend>Dados do Usuário</legend>

 <!-- Nome -->
 <label for="nome">Nome:</label>
 <input type="text" id="nome" name="nome" required placeholder=

"Digite seu nome">


 <!-- Email -->
 <label for="email">Email:</label>
 <input type="email" id="email" name="email" required placeholder="exemplo@email.com">

 <!-- Senha -->
 <label for="senha">Senha:</label>
 <input type="password" id="senha" name="senha" required minlength="6">


 <!-- Idade -->
 <label for="idade">Idade:</label>
<input type="number" id="idade" name="idade" min="18" required>
</fieldset>

 <fieldset>
<legend>Preferências</legend>

 <!-- Select -->
 <label for="categoria">Categoria de interesse:</label>
<select id="categoria" name="categoria">
     <option value="eletronicos">Eletrônicos</option>
<option value="roupas">Roupas</option>
 <option value="acessorios">Acessórios</option>
 </select>

<!-- Radio -->
<p>Tipo de cliente:</p>
<label>
<input type="radio" name="tipo" value="pf" required> Pessoa Física</label>
<label>
    <input type="radio" name="tipo" value="pj"> Pessoa Jurídica</label>

 <!-- Checkbox -->
 <p>Preferências:</p>
 <label>
<input type="checkbox" name="promo"> Receber promoções</label>
<label>
<input type="checkbox" name="novidades"> Receber novidades</label>
 </fieldset>

 <!-- Mensagem -->
 <label for="mensagem">Mensagem:</label>
 <textarea id="mensagem" name="mensagem" rows="4" placeholder="Digite sua mensagem"></textarea>

 <!-- Botão -->

 <button type="submit">Enviar</button>
</form>
 </section>
 </main>
<footer>
 <p>&copy; 2026 Minha Loja Online</p>
 </footer>
 </body>
 </html>
