<form 
id="form-contact"
action="/enviar"
method="POST"
novalidate>

<fieldset>
    <legend>Dados de Contato</legend>

    <label for="input-contato">
    CONTATO:
    </label>
    <input
    type="text"
    id="input-contato"
    contato="contato"
    required>

</fieldset>

<button type="submit">
    Enviar
</button>

</form>
